name: Build & Release DMG

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write   # Required to create GitHub Releases and upload assets

env:
  PROJECT_PATH: PersonalWallpaperEngineLite/PersonalWallpaperEngineLite.xcodeproj
  SCHEME: PersonalWallpaperEngineLite
  APP_NAME: PersonalWallpaperEngineLite

jobs:
  build-and-release:
    name: Build, Package & Release
    runs-on: macos-14

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Needed for git log release notes

      # ── 2. Resolve version ────────────────────────────────────────────────
      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "TAG=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      # ── 3. Show Xcode version (use runner default) ─────────────────────────
      - name: Show Xcode version
        run: xcodebuild -version

      # ── 4. Build archive ──────────────────────────────────────────────────
      - name: Build Archive
        run: |
          mkdir -p "${{ github.workspace }}/build"
          xcodebuild archive \
            -project "${{ env.PROJECT_PATH }}" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -archivePath "${{ github.workspace }}/build/${{ env.APP_NAME }}.xcarchive" \
            -derivedDataPath "${{ github.workspace }}/DerivedData" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="${{ steps.version.outputs.VERSION }}" \
            2>&1 | tail -50
          echo "Archive status: $?"
          ls -la "${{ github.workspace }}/build/"

      # ── 5. Verify archive & export .app ───────────────────────────────────
      - name: Export .app from archive
        run: |
          ARCHIVE="${{ github.workspace }}/build/${{ env.APP_NAME }}.xcarchive"
          EXPORT="${{ github.workspace }}/build/export"
          mkdir -p "${EXPORT}"
          if [ ! -d "${ARCHIVE}/Products/Applications/${{ env.APP_NAME }}.app" ]; then
            echo "ERROR: .app not found in archive. Build may have failed."
            find "${ARCHIVE}" -name "*.app" 2>/dev/null || true
            exit 1
          fi
          cp -R "${ARCHIVE}/Products/Applications/${{ env.APP_NAME }}.app" "${EXPORT}/"
          echo "Exported successfully:"
          ls -la "${EXPORT}/"

      # ── 6. Ad-hoc codesign (prevents "damaged app" Gatekeeper error) ────────
      - name: Ad-hoc codesign
        run: |
          APP="${{ github.workspace }}/build/export/${{ env.APP_NAME }}.app"
          codesign --force --deep --sign - "${APP}"
          echo "Codesign status: $?"
          codesign --verify --deep --strict "${APP}" && echo "Signature valid"

      # ── 7. Install create-dmg ─────────────────────────────────────────────
      - name: Install create-dmg
        run: brew install create-dmg

      # ── 7. Create DMG ─────────────────────────────────────────────────────
      - name: Create DMG
        id: dmg
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DMG_NAME="${{ env.APP_NAME }}-${VERSION}.dmg"
          DMG_OUTPUT="${{ github.workspace }}/build/${DMG_NAME}"
          EXPORT="${{ github.workspace }}/build/export"

          create-dmg \
            --volname "Personal Wallpaper Engine Lite" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "${{ env.APP_NAME }}.app" 170 190 \
            --hide-extension "${{ env.APP_NAME }}.app" \
            --app-drop-link 430 190 \
            --no-internet-enable \
            "${DMG_OUTPUT}" \
            "${EXPORT}/"

          echo "DMG_NAME=${DMG_NAME}" >> "$GITHUB_OUTPUT"
          echo "DMG_PATH=${DMG_OUTPUT}" >> "$GITHUB_OUTPUT"
          echo "Created: ${DMG_OUTPUT} ($(du -sh "${DMG_OUTPUT}" | cut -f1))"

      # ── 8. Upload DMG as workflow artifact ────────────────────────────────
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ steps.version.outputs.VERSION }}-dmg
          path: ${{ github.workspace }}/build/*.dmg
          retention-days: 30

      # ── 9. Generate release notes ─────────────────────────────────────────
      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^v${VERSION}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges | head -30)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges | head -10)
          fi
          {
            echo "CHANGES<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── 10. Create GitHub Release ─────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "Personal Wallpaper Engine Lite ${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          body: |
            ## Personal Wallpaper Engine Lite ${{ steps.version.outputs.VERSION }}

            A lightweight macOS menubar app that keeps your desktop fresh with beautiful wallpapers — powered by the free Pexels API.

            ### Install
            1. Download `${{ steps.dmg.outputs.DMG_NAME }}` below
            2. Open the DMG and drag the app to **Applications**
            3. Launch from Applications — look for the 📷 icon in your menu bar
            4. Click the icon → **Settings** tab → paste your free [Pexels API key](https://www.pexels.com/api/)

            > **Gatekeeper warning on older builds?** Right-click the app → Open → Open (this build is ad-hoc signed so it should open directly)

            ### Changes
            ${{ steps.notes.outputs.CHANGES }}

            ### Requirements
            - macOS 13.0 (Ventura) or later
          files: ${{ github.workspace }}/build/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
